# Predefined Profile Service - Docker Compose Configuration

services:
  # =========================================================================
  # Predefined Profile Service (Main Application)
  # =========================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: predefined-profile-service
    ports:
      - "8002:8000"
    env_file:
      - .env
    environment:
      # Redis - now pointing to shared-redis (use DB 0 to match drift detection service)
      - REDIS_URL=redis://shared-redis:6379/0
      # Behavior Resolution Service - using container name on shared network
      - BEHAVIOR_RESOLUTION_BASE_URL=http://behavior-extraction-engine:8001
      - DEBUG=false
      - LOG_LEVEL=INFO
    networks:
      - shared-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # =========================================================================
  # Redis Commander (Optional - Redis GUI for development)
  # =========================================================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: profile-redis-commander
    environment:
      - REDIS_HOSTS=local:shared-redis:6379
    ports:
      - "8083:8081"
    networks:
      - shared-network
    restart: unless-stopped
    profiles:
      - dev-tools

# =============================================================================
# Networks - Join the shared external network
# =============================================================================
networks:
  shared-network:
    external: true
    name: shared-network